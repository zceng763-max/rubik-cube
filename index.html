<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 魔方求解器</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --gold: #f0c040;
    --text: #e0e0e0;
    --muted: #8a8a9a;
    --green: #4caf84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    color: var(--text);
    user-select: none;
  }
  #canvas-container { flex: 1; position: relative; }
  #canvas-container canvas { display: block; }
  #panel {
    width: 320px;
    background: var(--panel);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    border-left: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
  }
  #panel h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #ff5a7a; box-shadow: 0 4px 20px rgba(233,69,96,0.35); }
  .btn-primary:disabled {
    background: #5a3040;
    color: #999;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: var(--text);
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
  .btn-outline:disabled {
    border-color: rgba(255,255,255,0.08);
    color: #555;
    cursor: not-allowed;
  }
  .size-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
  }
  .size-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .size-btn.active { background: var(--accent); color: #fff; }
  .info-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .info-label { color: var(--muted); font-size: 13px; }
  .info-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .move-counter { color: var(--gold); }
  .status-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color 0.3s;
  }
  .status-text.solving { color: var(--green); }
  .status-text.done { color: var(--gold); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .speed-slider { display: flex; align-items: center; gap: 10px; }
  .speed-slider label { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .speed-slider input { flex: 1; accent-color: var(--accent); }
  #hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <div id="hint">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移</div>
</div>

<div id="panel">
  <h1>🧊 魔方求解器</h1>

  <div class="size-toggle" id="sizeToggle">
    <button class="size-btn active" data-size="3">三阶 3×3</button>
    <button class="size-btn" data-size="2">二阶 2×2</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-outline" id="btnScramble">🔀 打乱</button>
    <button class="btn btn-primary" id="btnSolve">✨ 自动求解</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-outline" id="btnReset">↺ 重置</button>
    <button class="btn btn-outline" id="btnStop" style="display:none;">⏹ 停止</button>
  </div>

  <div class="divider"></div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-label">当前状态</span>
      <span class="info-value status-text" id="statusText">已还原 ✓</span>
    </div>
    <div class="info-row">
      <span class="info-label">打乱步数</span>
      <span class="info-value" id="scrambleCount">0</span>
    </div>
    <div class="info-row">
      <span class="info-label">求解步数</span>
      <span class="info-value move-counter" id="moveCount">0</span>
    </div>
  </div>

  <div class="speed-slider">
    <label>动画速度</label>
    <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
    <span style="font-size:12px;color:var(--muted);min-width:20px;" id="speedLabel">5×</span>
  </div>

  <div style="margin-top:auto;padding-top:16px;">
    <div class="status-text" id="msgText"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Constants ────────────────────────────────────────
const COLORS = {
  U: 0xffffff, D: 0xffd500, F: 0xb71234,
  B: 0xff5800, R: 0x0046ad, L: 0x009b48, X: 0x111111,
};

const COLOR_NAMES = ['U','D','F','B','R','L'];

// Face rotation config: { axis, layerCoord (in 0..n-1 space), rotationAxisVec, sign for clockwise }
// We define moves by: which axis, which layer index, and rotation direction
const MOVE_MAP_3 = {
  U: { ax: 'y', ly: 2, sign: -1 },
  D: { ax: 'y', ly: 0, sign: 1 },
  R: { ax: 'x', ly: 2, sign: -1 },
  L: { ax: 'x', ly: 0, sign: 1 },
  F: { ax: 'z', ly: 2, sign: -1 },
  B: { ax: 'z', ly: 0, sign: 1 },
};
const MOVE_MAP_2 = {
  U: { ax: 'y', ly: 1, sign: -1 },
  D: { ax: 'y', ly: 0, sign: 1 },
  R: { ax: 'x', ly: 1, sign: -1 },
  L: { ax: 'x', ly: 0, sign: 1 },
  F: { ax: 'z', ly: 1, sign: -1 },
  B: { ax: 'z', ly: 0, sign: 1 },
};

// ─── Logical Cube State (for tracking, not used for solving) ────
class CubeState {
  constructor(size) {
    this.size = size;
    this.faces = COLOR_NAMES.map(c => Array(size * size).fill(c));
  }
  reset() {
    this.faces = COLOR_NAMES.map(c => Array(this.size * this.size).fill(c));
  }
  clone() {
    const c = new CubeState(this.size);
    c.faces = this.faces.map(f => [...f]);
    return c;
  }
  isSolved() {
    for (let f = 0; f < 6; f++) {
      const c0 = this.faces[f][0];
      for (let i = 1; i < this.size * this.size; i++) {
        if (this.faces[f][i] !== c0) return false;
      }
    }
    return true;
  }
}

// ─── Inverse move helper ────────────────────────────────
function invertMove(m) {
  if (m.endsWith('2')) return m;
  if (m.endsWith("'")) return m[0];
  return m[0] + "'";
}

// ─── Three.js 3D Visual Cube ───────────────────────────
class VisualCube {
  constructor(container, size = 3) {
    this.container = container;
    this.size = size;
    this.cubies = [];
    this.animating = false;
    this.logical = new CubeState(size);
    this.lastScramble = [];  // ★ Store scramble moves for reverse-solve

    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45, 1, 0.5, 50);
    this.camera.position.set(6, 4.5, 7);
    this.camera.lookAt(0, 0, 0);

    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.2;
    this.container.appendChild(this.renderer.domElement);

    this.controls = new OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.08;
    this.controls.minDistance = 3;
    this.controls.maxDistance = 15;
    this.controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 1.8);
    this.scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 4);
    key.position.set(8, 12, 10);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.near = 0.5;
    key.shadow.camera.far = 50;
    key.shadow.camera.left = -15; key.shadow.camera.right = 15;
    key.shadow.camera.top = 15; key.shadow.camera.bottom = -15;
    key.shadow.bias = -0.0001;
    this.scene.add(key);

    const fill = new THREE.DirectionalLight(0x8899cc, 1.5);
    fill.position.set(-3, 2, -5);
    this.scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffccaa, 0.8);
    rim.position.set(0, -2, 8);
    this.scene.add(rim);

    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.y = -4;
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    this.scene.add(ground);

    this.cubeGroup = new THREE.Group();
    this.scene.add(this.cubeGroup);

    this._buildCube();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._animateLoop = this._animateLoop.bind(this);
    requestAnimationFrame(this._animateLoop);
  }

  _buildCube() {
    while (this.cubeGroup.children.length > 0) this.cubeGroup.remove(this.cubeGroup.children[0]);
    this.cubies = [];

    const n = this.size;
    const gap = 0.06;
    const cubieSize = n === 3 ? 0.85 : 1.35;
    const offset = (n - 1) / 2;
    const max = n - 1;

    for (let x = 0; x < n; x++) {
      for (let y = 0; y < n; y++) {
        for (let z = 0; z < n; z++) {
          if (n === 3 && x === 1 && y === 1 && z === 1) continue;
          const geo = new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize);
          const faceColors = [
            x === max ? COLORS.R : COLORS.X,
            x === 0 ? COLORS.L : COLORS.X,
            y === max ? COLORS.U : COLORS.X,
            y === 0 ? COLORS.D : COLORS.X,
            z === max ? COLORS.F : COLORS.X,
            z === 0 ? COLORS.B : COLORS.X,
          ];
          const materials = faceColors.map(c => new THREE.MeshStandardMaterial({
            color: c,
            roughness: c !== COLORS.X ? 0.35 : 0.9,
            metalness: c !== COLORS.X ? 0.05 : 0,
          }));
          const mesh = new THREE.Mesh(geo, materials);
          mesh.position.set(
            (x - offset) * (cubieSize + gap),
            (y - offset) * (cubieSize + gap),
            (z - offset) * (cubieSize + gap)
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          mesh.userData = { logicalPos: { x, y, z } };
          this.cubeGroup.add(mesh);
          this.cubies.push(mesh);
        }
      }
    }
  }

  _resize() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.renderer.setSize(w, h);
    this.camera.aspect = w / Math.max(h, 1);
    this.camera.updateProjectionMatrix();
  }

  _animateLoop() {
    requestAnimationFrame(this._animateLoop);
    this.controls.update();
    this.renderer.render(this.scene, this.camera);
  }

  async animateMove(move, durationMs = 150) {
    if (this.animating) {
      await new Promise(r => { const check = () => { if (!this.animating) r(); else requestAnimationFrame(check); }; check(); });
    }
    this.animating = true;

    const face = move[0];
    const mod = move.slice(1);
    const moveMap = this.size === 3 ? MOVE_MAP_3 : MOVE_MAP_2;
    const info = moveMap[face];
    if (!info) { this.animating = false; return; }

    const times = mod === '2' ? 2 : 1;
    const baseAngle = (Math.PI / 2) * info.sign;
    const angle = mod === "'" ? -baseAngle : baseAngle;

    for (let t = 0; t < times; t++) {
      await this._animateSingle(info.ax, info.ly, angle, durationMs);
    }
    this.animating = false;
  }

  _animateSingle(axis, layerIdx, targetAngle, durationMs) {
    return new Promise(resolve => {
      const n = this.size;
      const gap = 0.06;
      const cubieSize = n === 3 ? 0.85 : 1.35;
      const offset = (n - 1) / 2;
      const step = cubieSize + gap;

      // Find cubies in this layer
      const layerCubies = [];
      const axisIdx = axis === 'x' ? 0 : axis === 'y' ? 1 : 2;

      for (const cubie of this.cubies) {
        const lp = cubie.userData.logicalPos;
        const coord = [lp.x, lp.y, lp.z][axisIdx];
        if (coord === layerIdx) layerCubies.push(cubie);
      }

      if (layerCubies.length === 0) { resolve(); return; }

      // Create pivot at layer center
      const pivot = new THREE.Group();
      const pivotPos = new THREE.Vector3();
      if (axis === 'x') pivotPos.x = (layerIdx - offset) * step;
      if (axis === 'y') pivotPos.y = (layerIdx - offset) * step;
      if (axis === 'z') pivotPos.z = (layerIdx - offset) * step;
      pivot.position.copy(pivotPos);
      this.cubeGroup.add(pivot);

      for (const cubie of layerCubies) pivot.attach(cubie);

      const axVec = axis === 'x' ? new THREE.Vector3(1,0,0)
                  : axis === 'y' ? new THREE.Vector3(0,1,0)
                  : new THREE.Vector3(0,0,1);
      const startTime = performance.now();

      const animate = () => {
        const elapsed = performance.now() - startTime;
        const t = Math.min(elapsed / durationMs, 1.0);
        const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        pivot.quaternion.setFromAxisAngle(axVec, targetAngle * eased);

        if (t < 1.0) {
          requestAnimationFrame(animate);
        } else {
          pivot.quaternion.setFromAxisAngle(axVec, targetAngle);
          pivot.updateMatrixWorld();

          // Reparent back and update logical positions
          while (pivot.children.length > 0) {
            const child = pivot.children[0];
            this.cubeGroup.attach(child);

            const worldPos = new THREE.Vector3();
            child.getWorldPosition(worldPos);
            child.userData.logicalPos = {
              x: Math.round(worldPos.x / step + offset),
              y: Math.round(worldPos.y / step + offset),
              z: Math.round(worldPos.z / step + offset),
            };
            // Clamp
            const lp = child.userData.logicalPos;
            lp.x = Math.max(0, Math.min(n - 1, lp.x));
            lp.y = Math.max(0, Math.min(n - 1, lp.y));
            lp.z = Math.max(0, Math.min(n - 1, lp.z));
          }
          this.cubeGroup.remove(pivot);
          resolve();
        }
      };
      requestAnimationFrame(animate);
    });
  }

  resetCube(size = null) {
    if (size !== null) this.size = size;
    this.logical = new CubeState(this.size);
    this.lastScramble = [];
    this._buildCube();
  }

  async scramble(numMoves = 20) {
    const faces = ['U','D','R','L','F','B'];
    const mods = ['', "'", '2'];
    let lastFace = '';
    const moves = [];
    for (let i = 0; i < numMoves; i++) {
      let f;
      do { f = faces[Math.floor(Math.random() * faces.length)]; }
      while (f === lastFace);
      lastFace = f;
      moves.push(f + mods[Math.floor(Math.random() * mods.length)]);
    }

    const speed = parseFloat(document.getElementById('speedSlider').value);
    const dur = Math.max(30, 200 - speed * 15);

    for (const m of moves) {
      await this.animateMove(m, dur);
    }
    this.lastScramble = moves;
    return moves;
  }

  async applyMoves(moves, speed) {
    const dur = Math.max(30, 200 - speed * 15);
    for (const m of moves) {
      await this.animateMove(m, dur);
    }
  }
}

// ─── Main App ──────────────────────────────────────────
let visualCube;
let solving = false;
let stopRequested = false;

async function init() {
  const container = document.getElementById('canvas-container');
  visualCube = new VisualCube(container, 3);

  // Size toggle
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (solving) return;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const size = parseInt(btn.dataset.size);
      visualCube.resetCube(size);
      updateStatus('solved');
      document.getElementById('moveCount').textContent = '0';
      document.getElementById('scrambleCount').textContent = '0';
    });
  });

  // Scramble
  document.getElementById('btnScramble').addEventListener('click', async () => {
    if (solving) return;
    setButtonsEnabled(false);
    updateStatus('scrambling');
    document.getElementById('msgText').textContent = '🔀 打乱中...';

    const size = visualCube.size;
    const numMoves = size === 3 ? 20 : 10;
    const moves = await visualCube.scramble(numMoves);

    document.getElementById('scrambleCount').textContent = moves.length;
    document.getElementById('moveCount').textContent = '0';
    updateStatus('scrambled');
    document.getElementById('msgText').textContent = `已打乱 ${moves.length} 步，点击求解`;
    setButtonsEnabled(true);
  });

  // Solve — reverse scramble
  document.getElementById('btnSolve').addEventListener('click', async () => {
    if (solving) return;

    if (visualCube.lastScramble.length === 0) {
      document.getElementById('msgText').textContent = '请先打乱魔方';
      setTimeout(() => { document.getElementById('msgText').textContent = ''; }, 2000);
      return;
    }

    solving = true;
    stopRequested = false;
    setButtonsEnabled(false, true);
    updateStatus('solving');

    // ★ Build solution: invert each move, reverse order
    const solution = [...visualCube.lastScramble].reverse().map(invertMove);
    document.getElementById('msgText').textContent = `✨ 逆序还原 ${solution.length} 步...`;
    document.getElementById('moveCount').textContent = '0';
    document.getElementById('scrambleCount').textContent = visualCube.lastScramble.length;

    const speed = parseFloat(document.getElementById('speedSlider').value);

    let moveIdx = 0;
    for (const m of solution) {
      if (stopRequested) break;
      await visualCube.animateMove(m, Math.max(30, 200 - speed * 15));
      moveIdx++;
      document.getElementById('moveCount').textContent = moveIdx;
    }

    if (stopRequested) {
      updateStatus('stopped');
      document.getElementById('msgText').textContent = '⏹ 已停止';
    } else {
      visualCube.lastScramble = [];
      updateStatus('solved');
      document.getElementById('msgText').textContent = '✅ 还原完成!';
    }

    solving = false;
    setButtonsEnabled(true, false);
  });

  // Reset
  document.getElementById('btnReset').addEventListener('click', () => {
    if (solving) return;
    visualCube.resetCube(visualCube.size);
    updateStatus('solved');
    document.getElementById('moveCount').textContent = '0';
    document.getElementById('scrambleCount').textContent = '0';
    document.getElementById('msgText').textContent = '';
  });

  // Stop
  document.getElementById('btnStop').addEventListener('click', () => { stopRequested = true; });

  // Speed slider
  const speedSlider = document.getElementById('speedSlider');
  const speedLabel = document.getElementById('speedLabel');
  speedSlider.addEventListener('input', () => { speedLabel.textContent = speedSlider.value + '×'; });

  updateStatus('solved');
}

function setButtonsEnabled(enabled, showStop = false) {
  ['btnScramble','btnSolve','btnReset'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
  document.getElementById('btnStop').style.display = showStop ? '' : 'none';
  document.querySelectorAll('.size-btn').forEach(b => b.disabled = !enabled);
}

function updateStatus(state) {
  const el = document.getElementById('statusText');
  el.className = 'info-value status-text';
  el.textContent = { solved:'已还原 ✓', scrambled:'已打乱', scrambling:'打乱中...', solving:'求解中...', stopped:'已停止' }[state] || '';
  if (state === 'solving') el.classList.add('solving');
}

init().catch(console.error);
</script>
</body>
</html>
