<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 魔方求解器</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --gold: #f0c040;
    --text: #e0e0e0;
    --muted: #8a8a9a;
    --green: #4caf84;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    color: var(--text);
    user-select: none;
  }
  #canvas-container { flex: 1; position: relative; }
  #canvas-container canvas { display: block; }
  #panel {
    width: 320px;
    background: var(--panel);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-left: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
    overflow-y: auto;
  }
  #panel h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 2px 0; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #ff5a7a; box-shadow: 0 4px 20px rgba(233,69,96,0.35); }
  .btn-primary:disabled {
    background: #5a3040;
    color: #999;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: var(--text);
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
  .btn-outline:disabled {
    border-color: rgba(255,255,255,0.08);
    color: #555;
    cursor: not-allowed;
  }
  .size-toggle {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
  }
  .size-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .size-btn.active { background: var(--accent); color: #fff; }
  .info-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .info-label { color: var(--muted); font-size: 12px; }
  .info-value { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .move-counter { color: var(--gold); }
  .status-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color 0.3s;
  }
  .status-text.solving { color: var(--green); }
  .status-text.done { color: var(--gold); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .slider-group { display: flex; flex-direction: column; gap: 4px; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { color: var(--muted); font-size: 12px; white-space: nowrap; min-width: 60px; }
  .slider-row input { flex: 1; accent-color: var(--accent); }
  .slider-row span { font-size: 12px; color: var(--muted); min-width: 28px; text-align: right; }
  .complexity-row {
    display: flex;
    gap: 6px;
  }
  .comp-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .comp-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.1); }
  .comp-btn:hover:not(.active) { border-color: rgba(255,255,255,0.3); }
  .comp-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
  }
  #solverStatus {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    min-height: 16px;
  }
  .key-hint {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 0 2px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .key-hint.shift { color: var(--gold); }
  .key-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; color: var(--muted); }
  .key-row span { min-width: 40px; text-align: right; }
  #flash-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 80px;
    font-weight: 900;
    color: var(--gold);
    pointer-events: none;
    text-shadow: 0 0 30px rgba(240,192,64,0.6);
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
  }
  #flash-msg.pop { transform: translate(-50%, -50%) scale(1); opacity: 1; }
</style>
</head>
<body>

<div id="canvas-container">
  <div id="flash-msg"></div>
  <div id="hint">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移<br>⌨ 按键旋转魔方：见右侧面板</div>
</div>

<div id="panel">
  <h1>🧊 魔方求解器</h1>

  <div class="size-toggle" id="sizeToggle">
    <button class="size-btn active" data-size="3">三阶 3×3</button>
    <button class="size-btn" data-size="2">二阶 2×2</button>
  </div>

  <div id="solverStatus">Kociemba 求解器加载中...</div>

  <div class="complexity-row" id="complexityRow">
    <button class="comp-btn" data-level="easy">🟢 简单</button>
    <button class="comp-btn active" data-level="medium">🟡 中等</button>
    <button class="comp-btn" data-level="hard">🔴 复杂</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-outline" id="btnScramble">🔀 打乱</button>
    <button class="btn btn-primary" id="btnSolve">✨ 求解</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-outline" id="btnReset">↺ 重置</button>
    <button class="btn btn-outline" id="btnStop" style="display:none;">⏹ 停止</button>
  </div>

  <div class="divider"></div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-label">当前状态</span>
      <span class="info-value status-text" id="statusText">已还原 ✓</span>
    </div>
    <div class="info-row">
      <span class="info-label">打乱步数</span>
      <span class="info-value" id="scrambleCount">0</span>
    </div>
    <div class="info-row">
      <span class="info-label">最优解步数</span>
      <span class="info-value move-counter" id="optimalMoves">—</span>
    </div>
  </div>

  <div class="slider-group">
    <div class="slider-row">
      <label>求解速度</label>
      <input type="range" id="speedSlider" min="1" max="10" value="4" step="1">
      <span id="speedLabel">4×</span>
    </div>
  </div>

  <!-- Keyboard controls -->
  <div class="divider"></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:-8px;">⌨ 键盘旋转（手动把玩）</div>
  <div class="info-card" style="padding:10px 12px;">
    <div class="key-row"><span>U / D</span> 上下层</div>
    <div class="key-row"><span>R / L</span> 右 / 左层</div>
    <div class="key-row"><span>F / B</span> 前 / 后层</div>
    <div class="key-row"><span style="min-width:60px;"><span class="key-hint shift">Shift</span>+键</span> 反向旋转</div>
  </div>

  <div style="margin-top:auto;padding-top:12px;">
    <div class="status-text" id="msgText"></div>
  </div>
</div>

<!-- Kociemba solver (Kociemba two-phase algorithm) -->
<script src="https://unpkg.com/cube-solver@2.4.1/dist/bundle.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Constants ────────────────────────────────────────
const COLORS = {
  U: 0xffffff, D: 0xffd500, F: 0xb71234,
  B: 0xff5800, R: 0x0046ad, L: 0x009b48, X: 0x111111,
};

// ─── Visual Cube ───────────────────────────────────────
class VisualCube {
  constructor(container, size = 3) {
    this.container = container;
    this.size = size;
    this.cubies = [];
    this.animating = false;
    this.lastScramble = '';
    this.lastScrambleMoves = [];
    this.complexity = 'medium';

    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45, 1, 0.5, 50);
    this.camera.position.set(6, 4.5, 7);
    this.camera.lookAt(0, 0, 0);

    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.2;
    this.container.appendChild(this.renderer.domElement);

    this.controls = new OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.08;
    this.controls.minDistance = 3;
    this.controls.maxDistance = 15;
    this.controls.target.set(0, 0, 0);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 1.8);
    this.scene.add(ambient);
    const key = new THREE.DirectionalLight(0xffffff, 4);
    key.position.set(8, 12, 10);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.near = 0.5; key.shadow.camera.far = 50;
    key.shadow.camera.left = -15; key.shadow.camera.right = 15;
    key.shadow.camera.top = 15; key.shadow.camera.bottom = -15;
    key.shadow.bias = -0.0001;
    this.scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899cc, 1.5);
    fill.position.set(-3, 2, -5);
    this.scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffccaa, 0.8);
    rim.position.set(0, -2, 8);
    this.scene.add(rim);

    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 }));
    ground.position.y = -4; ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    this.scene.add(ground);

    this.cubeGroup = new THREE.Group();
    this.scene.add(this.cubeGroup);

    this._buildCube();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._loop = this._loop.bind(this);
    requestAnimationFrame(this._loop);
  }

  _buildCube() {
    while (this.cubeGroup.children.length > 0) this.cubeGroup.remove(this.cubeGroup.children[0]);
    this.cubies = [];
    const n = this.size, gap = 0.06;
    const cubieSize = n === 3 ? 0.85 : 1.35;
    const off = (n - 1) / 2, max = n - 1;

    for (let x = 0; x < n; x++) {
      for (let y = 0; y < n; y++) {
        for (let z = 0; z < n; z++) {
          if (n === 3 && x === 1 && y === 1 && z === 1) continue;
          const geo = new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize);
          const fc = [
            x === max ? COLORS.R : COLORS.X, x === 0 ? COLORS.L : COLORS.X,
            y === max ? COLORS.U : COLORS.X, y === 0 ? COLORS.D : COLORS.X,
            z === max ? COLORS.F : COLORS.X, z === 0 ? COLORS.B : COLORS.X,
          ];
          const mats = fc.map(c => new THREE.MeshStandardMaterial({
            color: c, roughness: c !== COLORS.X ? 0.35 : 0.9, metalness: c !== COLORS.X ? 0.05 : 0,
          }));
          const mesh = new THREE.Mesh(geo, mats);
          mesh.position.set((x-off)*(cubieSize+gap), (y-off)*(cubieSize+gap), (z-off)*(cubieSize+gap));
          mesh.castShadow = true; mesh.receiveShadow = true;
          mesh.userData = { logicalPos: { x, y, z } };
          this.cubeGroup.add(mesh);
          this.cubies.push(mesh);
        }
      }
    }
  }

  _resize() {
    const w = this.container.clientWidth, h = this.container.clientHeight;
    this.renderer.setSize(w, h);
    this.camera.aspect = w / Math.max(h, 1);
    this.camera.updateProjectionMatrix();
  }

  _loop() {
    requestAnimationFrame(this._loop);
    this.controls.update();
    this.renderer.render(this.scene, this.camera);
  }

  async animateMove(move, durationMs = 150) {
    if (this.animating) {
      await new Promise(r => {
        const check = () => { if (!this.animating) r(); else requestAnimationFrame(check); };
        check();
      });
    }
    this.animating = true;

    const face = move[0], mod = move.slice(1);
    const n = this.size, gap = 0.06;
    const cubieSize = n === 3 ? 0.85 : 1.35;
    const off = (n - 1) / 2, step = cubieSize + gap;

    // Face → { axisIdx, layerIdx, sign }
    const map = {};
    if (n === 3) {
      map.U={ax:1,ly:2,s:-1}; map.D={ax:1,ly:0,s:1};
      map.R={ax:0,ly:2,s:-1}; map.L={ax:0,ly:0,s:1};
      map.F={ax:2,ly:2,s:-1}; map.B={ax:2,ly:0,s:1};
    } else {
      map.U={ax:1,ly:1,s:-1}; map.D={ax:1,ly:0,s:1};
      map.R={ax:0,ly:1,s:-1}; map.L={ax:0,ly:0,s:1};
      map.F={ax:2,ly:1,s:-1}; map.B={ax:2,ly:0,s:1};
    }
    const info = map[face];
    if (!info) { this.animating = false; return; }

    const times = mod === '2' ? 2 : 1;
    const base = (Math.PI/2) * info.s;
    const angle = mod === "'" ? -base : base;

    for (let t = 0; t < times; t++) {
      await this._animateOne(info.ax, info.ly, angle, off, step, n, durationMs);
    }
    this.animating = false;
  }

  _animateOne(axIdx, layerIdx, targetAngle, off, step, n, durationMs) {
    return new Promise(resolve => {
      const layerCubies = [];
      for (const c of this.cubies) {
        const coord = [c.userData.logicalPos.x, c.userData.logicalPos.y, c.userData.logicalPos.z][axIdx];
        if (coord === layerIdx) layerCubies.push(c);
      }
      if (layerCubies.length === 0) { resolve(); return; }

      const pivot = new THREE.Group();
      const pp = new THREE.Vector3();
      if (axIdx === 0) pp.x = (layerIdx-off)*step;
      if (axIdx === 1) pp.y = (layerIdx-off)*step;
      if (axIdx === 2) pp.z = (layerIdx-off)*step;
      pivot.position.copy(pp);
      this.cubeGroup.add(pivot);
      for (const c of layerCubies) pivot.attach(c);

      const ax = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)][axIdx];
      const t0 = performance.now();

      const anim = () => {
        const elapsed = performance.now() - t0;
        const t = Math.min(elapsed / durationMs, 1);
        const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        pivot.quaternion.setFromAxisAngle(ax, targetAngle * e);
        if (t < 1) { requestAnimationFrame(anim); return; }

        pivot.quaternion.setFromAxisAngle(ax, targetAngle);
        pivot.updateMatrixWorld();
        while (pivot.children.length > 0) {
          const ch = pivot.children[0];
          this.cubeGroup.attach(ch);
          const wp = new THREE.Vector3();
          ch.getWorldPosition(wp);
          const lp = ch.userData.logicalPos;
          lp.x = Math.round(wp.x/step+off); lp.y = Math.round(wp.y/step+off); lp.z = Math.round(wp.z/step+off);
          lp.x = Math.max(0, Math.min(n-1, lp.x));
          lp.y = Math.max(0, Math.min(n-1, lp.y));
          lp.z = Math.max(0, Math.min(n-1, lp.z));
        }
        this.cubeGroup.remove(pivot);
        resolve();
      };
      requestAnimationFrame(anim);
    });
  }

  resetCube(size = null) {
    if (size !== null) this.size = size;
    this.lastScramble = '';
    this.lastScrambleMoves = [];
    this._buildCube();
  }

  generateScramble(numMoves) {
    const faces = ['U','D','R','L','F','B'];
    const mods = ['', "'", '2'];
    let last = '';
    const moves = [];
    for (let i = 0; i < numMoves; i++) {
      let f;
      do { f = faces[Math.floor(Math.random()*faces.length)]; } while (f === last);
      last = f;
      moves.push(f + mods[Math.floor(Math.random()*mods.length)]);
    }
    return { moves, str: moves.join(' ') };
  }

  async scramble(numMoves) {
    const { moves, str } = this.generateScramble(numMoves);
    const dur = 50; // ★ Fast scramble animation
    for (const m of moves) await this.animateMove(m, dur);
    this.lastScramble = str;
    this.lastScrambleMoves = moves;
    return { moves, str };
  }

  async applyMoves(moves, speedMs) {
    for (const m of moves) await this.animateMove(m, speedMs);
  }
}

// ─── Main App ──────────────────────────────────────────
let visualCube, solving = false, stopRequested = false;
let appliedMoveHistory = [];
let solverReady = false;

// Keyboard → face mapping
const KEY_FACE_MAP = {
  'u': 'U', 'd': 'D', 'r': 'R', 'l': 'L', 'f': 'F', 'b': 'B',
};

function popFlash(text) {
  const el = document.getElementById('flash-msg');
  el.textContent = text;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 350);
}

function handleKeyMove(key, shift) {
  if (solving || visualCube.animating) return;

  const face = KEY_FACE_MAP[key];
  if (!face) return;

  const mod = shift ? "'" : '';
  const move = face + mod;
  const dur = 100; // fast & responsive for manual play

  // Track for solver
  appliedMoveHistory.push(move);
  visualCube.lastScramble = appliedMoveHistory.join(' ');
  visualCube.lastScrambleMoves = appliedMoveHistory.slice();

  visualCube.animateMove(move, dur);

  // Flash feedback
  popFlash(face + (mod || ''));
  document.getElementById('scrambleCount').textContent = appliedMoveHistory.length;
  document.getElementById('optimalMoves').textContent = '—';
  updateStatus('scrambled');
}

function complexityMoves(level, size) {
  if (size === 3) return { easy: 8, medium: 15, hard: 20 }[level];
  return { easy: 5, medium: 10, hard: 15 }[level];
}

function invertMove(m) {
  if (m.endsWith('2')) return m;
  if (m.endsWith("'")) return m[0];
  return m[0] + "'";
}

async function init() {
  const container = document.getElementById('canvas-container');
  visualCube = new VisualCube(container, 3);

  // Init Kociemba solver (takes ~2s)
  const statusEl = document.getElementById('solverStatus');
  try {
    if (typeof cubeSolver !== 'undefined') {
      cubeSolver.initialize('kociemba');
      statusEl.textContent = '✅ Kociemba 求解器就绪';
      statusEl.style.color = '#4caf84';
      solverReady = true;
    }
  } catch(e) {
    statusEl.textContent = '⚠ 使用备用求解器';
    statusEl.style.color = '#f0c040';
  }

  // Size toggle
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (solving) return;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      visualCube.resetCube(parseInt(btn.dataset.size));
      appliedMoveHistory = [];
      updateStatus('solved');
      document.getElementById('scrambleCount').textContent = '0';
      document.getElementById('optimalMoves').textContent = '—';
    });
  });

  // Complexity toggle
  document.querySelectorAll('.comp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      visualCube.complexity = btn.dataset.level;
    });
  });

  // Scramble
  document.getElementById('btnScramble').addEventListener('click', async () => {
    if (solving) return;
    setButtonsEnabled(false);
    updateStatus('scrambling');
    document.getElementById('msgText').textContent = '🔀 快速打乱中...';

    const size = visualCube.size;
    const level = visualCube.complexity;
    const n = complexityMoves(level, size);
    const result = await visualCube.scramble(n);

    appliedMoveHistory = result.moves.slice();
    document.getElementById('scrambleCount').textContent = result.moves.length;

    // ★ Compute optimal solution with Kociemba (for 3x3)
    if (size === 3 && solverReady) {
      try {
        const solution = cubeSolver.solve(result.str);
        const solMoves = solution.split(/\s+/).filter(Boolean);
        document.getElementById('optimalMoves').textContent = solMoves.length;
      } catch(e) {
        document.getElementById('optimalMoves').textContent = '—';
      }
    } else {
      document.getElementById('optimalMoves').textContent = result.moves.length;
    }

    updateStatus('scrambled');
    document.getElementById('msgText').textContent = `已打乱 ${result.moves.length} 步`;
    setButtonsEnabled(true);
  });

  // Solve
  document.getElementById('btnSolve').addEventListener('click', async () => {
    if (solving) return;
    if (appliedMoveHistory.length === 0) {
      document.getElementById('msgText').textContent = '请先打乱或旋转魔方';
      setTimeout(() => { document.getElementById('msgText').textContent = ''; }, 2000);
      return;
    }

    solving = true; stopRequested = false;
    setButtonsEnabled(false, true);
    updateStatus('solving');

    const size = visualCube.size;
    let solution;

    // Sync current state to VisualCube for solver
    visualCube.lastScramble = appliedMoveHistory.join(' ');
    visualCube.lastScrambleMoves = appliedMoveHistory.slice();

    if (size === 3 && solverReady) {
      // ★ Kociemba optimal solve
      document.getElementById('msgText').textContent = '🧠 Kociemba 计算最优解...';
      try {
        const solStr = cubeSolver.solve(visualCube.lastScramble);
        solution = solStr.split(/\s+/).filter(Boolean);
        document.getElementById('optimalMoves').textContent = solution.length;
      } catch(e) {
        // Fallback to reverse
        solution = [...appliedMoveHistory].reverse().map(invertMove);
        document.getElementById('optimalMoves').textContent = solution.length;
      }
    } else {
      // 2x2: reverse scramble
      solution = [...appliedMoveHistory].reverse().map(invertMove);
      document.getElementById('optimalMoves').textContent = solution.length;
    }

    document.getElementById('msgText').textContent = `✨ 执行 ${solution.length} 步最优解...`;

    const speed = parseFloat(document.getElementById('speedSlider').value);
    const dur = Math.max(50, 300 - speed * 25);

    let idx = 0;
    for (const m of solution) {
      if (stopRequested) break;
      await visualCube.animateMove(m, dur);
      idx++;
      document.getElementById('scrambleCount').textContent = `${idx}/${solution.length}`;
    }

    if (stopRequested) {
      appliedMoveHistory = [];
      visualCube.lastScramble = '';
      visualCube.lastScrambleMoves = [];
      updateStatus('stopped');
      document.getElementById('msgText').textContent = '⏹ 已停止';
    } else {
      appliedMoveHistory = [];
      visualCube.lastScramble = '';
      visualCube.lastScrambleMoves = [];
      updateStatus('solved');
      document.getElementById('msgText').textContent = '✅ 还原完成!';
    }

    solving = false;
    setButtonsEnabled(true, false);
  });

  // Reset
  document.getElementById('btnReset').addEventListener('click', () => {
    if (solving) return;
    visualCube.resetCube(visualCube.size);
    appliedMoveHistory = [];
    updateStatus('solved');
    document.getElementById('scrambleCount').textContent = '0';
    document.getElementById('optimalMoves').textContent = '—';
    document.getElementById('msgText').textContent = '';
  });

  // Stop
  document.getElementById('btnStop').addEventListener('click', () => { stopRequested = true; });

  // Speed slider
  document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedLabel').textContent = e.target.value + '×';
  });

  // ─── Keyboard Controls ─────────────────────────────
  window.addEventListener('keydown', e => {
    // Ignore if any modifier other than Shift is held (e.g. Ctrl+R, Cmd+F)
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    const key = e.key.toLowerCase();
    if (KEY_FACE_MAP[key]) {
      e.preventDefault();
      handleKeyMove(key, e.shiftKey);
    }
  });

  // ─── Touch swipe support for mobile ─────────────────
  let touchStart = null;
  const canvasEl = container.querySelector('canvas');
  canvasEl.addEventListener('touchstart', e => {
    if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvasEl.addEventListener('touchend', e => {
    if (!touchStart || solving || visualCube.animating) return;
    const dx = (e.changedTouches[0]?.clientX || 0) - touchStart.x;
    const dy = (e.changedTouches[0]?.clientY || 0) - touchStart.y;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 40) return; // too short
    if (absDx > absDy) {
      handleKeyMove(dx > 0 ? 'r' : 'l', false);
    } else {
      handleKeyMove(dy > 0 ? 'd' : 'u', false);
    }
    touchStart = null;
  });

  updateStatus('solved');
}

function setButtonsEnabled(enabled, showStop = false) {
  ['btnScramble','btnSolve','btnReset'].forEach(id => document.getElementById(id).disabled = !enabled);
  document.getElementById('btnStop').style.display = showStop ? '' : 'none';
  document.querySelectorAll('.size-btn,.comp-btn').forEach(b => b.disabled = !enabled);
}

function updateStatus(state) {
  const el = document.getElementById('statusText');
  el.className = 'info-value status-text';
  el.textContent = { solved:'已还原 ✓', scrambled:'已打乱', scrambling:'打乱中...', solving:'求解中...', stopped:'已停止' }[state] || '';
  if (state === 'solving') el.classList.add('solving');
}

init().catch(console.error);
</script>
</body>
</html>
